version: '3.8'

services:
  api:
    build: .
    container_name: fincashly-api
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=db;Port=5432;Database=fincashly;Username=postgres;Password=postgres

  db:
    image: postgres:15
    container_name: fincashly-db
    environment:
      POSTGRES_DB: fincashly
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"